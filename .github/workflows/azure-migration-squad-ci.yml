name: azure-migration-squad CI

# ╔═════════════════════════════════════════════════════════════════════════╗
# ║  SOURCE-OF-TRUTH RULE — READ BEFORE EDITING ANY MIGRATION-SQUAD FILE    ║
# ║                                                                          ║
# ║  Edit canonical content here:                                            ║
# ║    .github/{prompts,skills,chatmodes,hooks}/                            ║
# ║    .github/copilot-instructions.md                                      ║
# ║    .squad/{agents,team.md,routing.md}                                   ║
# ║    AGENTS.md                                                            ║
# ║                                                                          ║
# ║  NEVER edit packages/azure-migration-squad/templates/ directly.         ║
# ║  Those files are auto-generated by `npm run sync`.                     ║
# ║                                                                          ║
# ║  The `check-templates-not-edited` job below enforces this.             ║
# ╚═════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [main]
    paths:
      - 'packages/azure-migration-squad/**'
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - '.squad/**'
      - 'AGENTS.md'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'plugin.manifest.json'
      - 'scripts/**'
      - '.github/workflows/azure-migration-squad-ci.yml'
  pull_request:
    paths:
      - 'packages/azure-migration-squad/**'
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - '.squad/**'
      - 'AGENTS.md'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'plugin.manifest.json'
      - 'scripts/**'

jobs:
  build:
    # Linux-only matrix to keep CI minutes low. The package is OS-agnostic
    # (pure Node.js, no native deps), so cross-OS coverage isn't needed for
    # every push. Run a manual cross-OS smoke before each release if desired.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install workspaces
        run: npm install --workspaces=false && npm install --workspaces

      - name: Validate descriptions ≤1024 chars (root content)
        run: npm run validate:descriptions

      - name: Rebuild plugin manifest from disk
        run: npm run build:plugin-manifest

      - name: Validate plugin manifest
        run: npm run validate:plugin-manifest

      # ────────────────────────────────────────────────────────────────────
      # SOURCE-OF-TRUTH GUARD
      # Fails the build if anyone edited templates/ directly instead of the
      # canonical files at the monorepo root. See docs/contributing-adapters.md
      # and packages/azure-migration-squad/templates/README.md.
      # ────────────────────────────────────────────────────────────────────
      - name: Check templates/ was not edited by hand
        run: node scripts/check-templates-not-edited.mjs

      - name: Sync templates from root
        working-directory: packages/azure-migration-squad
        run: npm run sync

      - name: Validate build
        working-directory: packages/azure-migration-squad
        run: npm run build

      - name: Lint (PII leak check)
        working-directory: packages/azure-migration-squad
        run: npm run lint

      - name: Install smoke tests
        working-directory: packages/azure-migration-squad
        env:
          AZURE_MIGRATION_SQUAD_TELEMETRY: '0'
          CI: 'true'
        run: node --test test/install.test.mjs

      - name: Evaluator-driven eval suite
        working-directory: packages/azure-migration-squad
        env:
          AZURE_MIGRATION_SQUAD_TELEMETRY: '0'
          CI: 'true'
        run: node --test test/eval-suite.test.mjs

      - name: npm pack smoke test
        working-directory: packages/azure-migration-squad
        run: npm pack --dry-run

      # ────────────────────────────────────────────────────────────────────
      # VS CODE EXTENSION (azure-migration-squad-vscode)
      # Build the .vsix and run extension activation tests in a headless
      # VS Code Insiders instance. Insiders is used to avoid mutex conflicts
      # with any host VS Code install on developer machines.
      # ────────────────────────────────────────────────────────────────────
      - name: Build VS Code extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run build

      - name: Package VS Code extension (.vsix)
        working-directory: packages/azure-migration-squad-vscode
        run: npm run package

      - name: Run VS Code extension tests (headless)
        working-directory: packages/azure-migration-squad-vscode
        env:
          DISPLAY: ':99.0'
        run: |
          # xvfb is needed for headless VS Code on Linux CI runners
          sudo apt-get update && sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          npm test

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-migration-squad-vscode-vsix
          path: packages/azure-migration-squad-vscode/*.vsix
          if-no-files-found: error
          retention-days: 30
