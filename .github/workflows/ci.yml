name: CI

# ╔═════════════════════════════════════════════════════════════════════════╗
# ║  Builds and tests the VS Code extension that bundles the                ║
# ║  Azure Migration Agent's prompts/skills/chatmodes/agents/hooks.         ║
# ║                                                                          ║
# ║  Edit canonical content here:                                            ║
# ║    .github/{prompts,skills,chatmodes,hooks,agents}/                     ║
# ║    .github/copilot-instructions.md                                      ║
# ║                                                                          ║
# ║  The extension bundles a copy at packages/azure-migration-squad-vscode/ ║
# ║  templates/ via the package's sync script (run at build time).         ║
# ╚═════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [main]
    paths:
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install workspaces
        run: npm install --workspaces=false && npm install --workspaces

      - name: Validate descriptions ≤1024 chars (root content)
        run: npm run validate:descriptions

      # ────────────────────────────────────────────────────────────────────
      # DECISION HARDSTOP COVERAGE
      # Fails the build if any catalog item in decision-catalog.md is not
      # referenced by at least one phase prompt. See
      # .github/skills/decision-hardstop.md for the full protocol.
      # ────────────────────────────────────────────────────────────────────
      - name: Validate decision-catalog coverage
        run: npm run validate:decision-coverage

      # ────────────────────────────────────────────────────────────────────
      # VS CODE EXTENSION
      # The only distribution path. Bundles content from .github/* and
      # ships a Marketplace-ready .vsix.
      # ────────────────────────────────────────────────────────────────────
      - name: Sync templates from root to extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run sync

      - name: Build VS Code extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run build

      - name: Package VS Code extension (.vsix)
        working-directory: packages/azure-migration-squad-vscode
        run: npm run package

      - name: Run VS Code extension tests (headless)
        working-directory: packages/azure-migration-squad-vscode
        env:
          DISPLAY: ':99.0'
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          npm test

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-migration-agent-vsix
          path: packages/azure-migration-squad-vscode/*.vsix
          if-no-files-found: error
          retention-days: 30
