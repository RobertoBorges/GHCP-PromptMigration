name: CI

# ╔═════════════════════════════════════════════════════════════════════════╗
# ║  Builds and tests the VS Code extension that bundles the                ║
# ║  Azure Migration Agent's prompts/skills/chatmodes/agents/hooks.         ║
# ║                                                                          ║
# ║  Edit canonical content here:                                            ║
# ║    .github/{prompts,skills,chatmodes,hooks,agents}/                     ║
# ║    .github/copilot-instructions.md                                      ║
# ║                                                                          ║
# ║  The extension bundles a copy at packages/azure-migration-squad-vscode/ ║
# ║  templates/ via the package's sync script (run at build time).         ║
# ╚═════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [main]
    paths:
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'packages/azure-migration-squad-vscode/**'
      - '.github/**'
      - 'MIGRATION-START-HERE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install workspaces
        run: npm install --workspaces=false && npm install --workspaces

      - name: Validate descriptions ≤1024 chars (root content)
        run: npm run validate:descriptions

      # ────────────────────────────────────────────────────────────────────
      # DECISION HARDSTOP COVERAGE
      # Fails the build if any catalog item in decision-catalog.md is not
      # referenced by at least one phase prompt. See
      # .github/skills/decision-hardstop.md for the full protocol.
      # ────────────────────────────────────────────────────────────────────
      - name: Validate decision-catalog coverage
        run: npm run validate:decision-coverage

      # ────────────────────────────────────────────────────────────────────
      # VS CODE EXTENSION
      # The only distribution path. Bundles content from .github/* and
      # ships a Marketplace-ready .vsix.
      # ────────────────────────────────────────────────────────────────────
      - name: Sync templates from root to extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run sync

      - name: Build VS Code extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run build

      - name: Package VS Code extension (.vsix)
        working-directory: packages/azure-migration-squad-vscode
        run: npm run package

      - name: Run VS Code extension tests (headless)
        working-directory: packages/azure-migration-squad-vscode
        env:
          DISPLAY: ':99.0'
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          npm test

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-migration-agent-vsix
          path: packages/azure-migration-squad-vscode/*.vsix
          if-no-files-found: error
          retention-days: 30

      # ────────────────────────────────────────────────────────────────────
      # RAW AGENT CONTENT PACK
      # A separate artifact containing the canonical .github/* content
      # plus MIGRATION-START-HERE.md. This is what users who prefer NOT
      # to install the VS Code extension can download and drop into their
      # own project's .github/ folder directly. Same content the extension
      # bundles internally under templates/github/.
      # ────────────────────────────────────────────────────────────────────
      - name: Stage agent content pack
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/agent-content-pack"
          mkdir -p "$STAGE/.github" "$STAGE"
          # Canonical .github subfolders the extension bundles
          cp -R .github/agents "$STAGE/.github/"
          cp -R .github/prompts "$STAGE/.github/"
          cp -R .github/skills "$STAGE/.github/"
          cp -R .github/chatmodes "$STAGE/.github/"
          cp -R .github/hooks "$STAGE/.github/"
          cp .github/copilot-instructions.md "$STAGE/.github/"
          # Top-level welcome doc
          cp MIGRATION-START-HERE.md "$STAGE/"
          # Small README explaining how to use the pack
          cat > "$STAGE/README.md" <<'EOF'
          # Azure Migration Agent — content pack

          This ZIP contains the canonical agent definition, prompts, skills,
          chatmodes, hooks, and welcome doc that back the Azure Migration Agent.

          ## Usage (without the VS Code extension)

          1. Extract this ZIP into any repository.
          2. Files land under `.github/` and at the repo root (`MIGRATION-START-HERE.md`).
          3. Open the folder in a Copilot-Chat-capable client (VS Code + Copilot Chat, GitHub Copilot CLI, etc.).
          4. Type `/assess-any-application` in Copilot Chat, or the natural-language equivalent.

          For the guided experience (sidebar, decisions panel, status bar,
          session-lifecycle hooks), install the VS Code extension instead:
          https://marketplace.visualstudio.com/items?itemName=robertoborges.azure-migration-squad-vscode

          Source repo: https://github.com/RobertoBorges/GHCP-PromptMigration
          EOF
          echo "Staged content pack:"
          find "$STAGE" -type f | wc -l
          du -sh "$STAGE"

      - name: Upload agent content pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-content-pack
          path: ${{ runner.temp }}/agent-content-pack/
          if-no-files-found: error
          retention-days: 30
