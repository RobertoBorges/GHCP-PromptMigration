name: Create Prompts and Chatmodes Archive

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release with the archive'
        required: false
        default: false
        type: boolean
  push:
    branches: [main, update-2-sa-team-feedback]
    paths:
      - '.github/prompts/**'
      - '.github/chatmodes/**'
  pull_request:
    branches: [main, update-2-sa-team-feedback]
    paths:
      - '.github/prompts/**'
      - '.github/chatmodes/**'

jobs:
  create-archive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create temporary directory structure
      run: |
        mkdir -p temp-archive/.github/prompts
        mkdir -p temp-archive/.github/chatmodes
        
    - name: Debug - Check source directories
      run: |
        echo "Checking source directories:"
        ls -la .github/ || echo ".github directory not found"
        echo "Prompts directory:"
        ls -la .github/prompts/ || echo "prompts directory not found"
        echo "Chatmodes directory:"
        ls -la .github/chatmodes/ || echo "chatmodes directory not found"
        
    - name: Copy prompts and chatmodes to temporary structure
      run: |
        # Copy prompts if directory exists and has files
        if [ -d ".github/prompts" ]; then
          if [ "$(find .github/prompts -type f | wc -l)" -gt 0 ]; then
            cp -r .github/prompts/. temp-archive/.github/prompts/
            echo "✓ Copied $(find .github/prompts -type f | wc -l) files from prompts directory"
          else
            echo "⚠ Prompts directory exists but is empty"
          fi
        else
          echo "⚠ Prompts directory does not exist"
        fi
        
        # Copy chatmodes if directory exists and has files
        if [ -d ".github/chatmodes" ]; then
          if [ "$(find .github/chatmodes -type f | wc -l)" -gt 0 ]; then
            cp -r .github/chatmodes/. temp-archive/.github/chatmodes/
            echo "✓ Copied $(find .github/chatmodes -type f | wc -l) files from chatmodes directory"
          else
            echo "⚠ Chatmodes directory exists but is empty"
          fi
        else
          echo "⚠ Chatmodes directory does not exist"
        fi
        
    - name: Verify directory structure
      run: |
        echo "Directory structure after copy:"
        find temp-archive -type f || echo "No files found"
        echo "Listing temp-archive/.github contents:"
        ls -la temp-archive/.github/ || echo "temp-archive/.github/ is empty or doesn't exist"
        echo "Listing temp-archive/.github/prompts contents:"
        ls -la temp-archive/.github/prompts/ || echo "temp-archive/.github/prompts/ is empty or doesn't exist"
        echo "Listing temp-archive/.github/chatmodes contents:"
        ls -la temp-archive/.github/chatmodes/ || echo "temp-archive/.github/chatmodes/ is empty or doesn't exist"
        
    - name: Upload artifact (GitHub will auto-zip)
      uses: actions/upload-artifact@v4
      with:
        name: github-prompts-chatmodes-${{ github.sha }}
        path: |
          temp-archive/.github/prompts/
          temp-archive/.github/chatmodes/
        retention-days: 30
        if-no-files-found: error
        
    - name: Create zip for release
      if: inputs.create_release == true
      run: |
        cd temp-archive
        zip -r ../github-prompts-chatmodes.zip .github/
        cd ..
        
    - name: Create release (optional)
      if: inputs.create_release == true
      uses: softprops/action-gh-release@v1
      with:
        tag_name: prompts-v${{ github.run_number }}
        name: GitHub Prompts and Chatmodes v${{ github.run_number }}
        body: |
          Release of GitHub prompts and chatmodes
          
          This archive contains:
          - `.github/prompts/` - All prompt files
          - `.github/chatmodes/` - All chatmode files
          
          Generated from commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
        files: github-prompts-chatmodes.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}