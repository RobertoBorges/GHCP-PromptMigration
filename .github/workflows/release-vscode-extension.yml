name: Release VS Code extension

# ╔═════════════════════════════════════════════════════════════════════════╗
# ║  PUBLISHES azure-migration-squad-vscode to the VS Code Marketplace     ║
# ║  AND the Open VSX Registry (for VS Codium etc).                         ║
# ║                                                                          ║
# ║  Triggered by:                                                           ║
# ║    1. Push of a tag matching `vscode-vX.Y.Z` (manual release)          ║
# ║    2. Manual workflow_dispatch (for testing)                             ║
# ║                                                                          ║
# ║  Required secrets:                                                       ║
# ║    VSCE_PAT       — Personal Access Token for Visual Studio Marketplace ║
# ║                     (Azure DevOps PAT with Marketplace > Publish scope) ║
# ║    OVSX_PAT       — (optional) Open VSX Registry token                  ║
# ║                                                                          ║
# ║  See: docs/publishing-vscode-extension.md for setup steps.              ║
# ╚═════════════════════════════════════════════════════════════════════════╝

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry-run only (build .vsix, no publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspaces
        run: npm install --workspaces=false && npm install --workspaces

      # ────────────────────────────────────────────────────────────────────
      # TAG vs PACKAGE.JSON version guard
      #
      # The tag that fired this workflow (e.g., vscode-v0.2.1) MUST match
      # the version in packages/azure-migration-squad-vscode/package.json.
      # A mismatch means:
      #   - Someone manually tagged without bumping package.json, OR
      #   - Someone bumped package.json without pushing the matching tag
      # Either way, we do NOT want to publish — fail fast and loud.
      #
      # This step is skipped for workflow_dispatch (manual runs) because
      # those don't have a tag to compare against.
      # ────────────────────────────────────────────────────────────────────
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG_VER="${GITHUB_REF_NAME#vscode-v}"
          PKG_VER=$(node -p "require('./packages/azure-migration-squad-vscode/package.json').version")
          echo "Tag version:         $TAG_VER"
          echo "package.json version: $PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (${TAG_VER}) does not match package.json version ${PKG_VER}. Bump the version + retag, or use release-please to keep them in sync."
            exit 1
          fi
          echo "✓ Tag matches package.json version"

      - name: Build VS Code extension
        working-directory: packages/azure-migration-squad-vscode
        run: npm run build

      - name: Package .vsix
        working-directory: packages/azure-migration-squad-vscode
        run: npm run package

      - name: Show package contents
        working-directory: packages/azure-migration-squad-vscode
        run: |
          echo "Built .vsix files:"
          ls -la *.vsix
          echo ""
          echo "Manifest preview:"
          cat package.json | head -50

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-${{ github.run_number }}
          path: packages/azure-migration-squad-vscode/*.vsix
          retention-days: 90

      # ────────────────────────────────────────────────────────────────────
      # RAW AGENT CONTENT PACK
      # Same content the .vsix bundles under templates/github/, packaged
      # as a plain ZIP for users who want to drop the agent into their
      # project without installing the VS Code extension.
      # ────────────────────────────────────────────────────────────────────
      - name: Stage agent content pack
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/agent-content-pack"
          mkdir -p "$STAGE/.github"
          cp -R .github/agents "$STAGE/.github/"
          cp -R .github/prompts "$STAGE/.github/"
          cp -R .github/skills "$STAGE/.github/"
          cp -R .github/chatmodes "$STAGE/.github/"
          cp -R .github/hooks "$STAGE/.github/"
          cp .github/copilot-instructions.md "$STAGE/.github/"
          cp MIGRATION-START-HERE.md "$STAGE/"
          cat > "$STAGE/README.md" <<'EOF'
          # Azure Migration Agent — content pack

          This ZIP contains the canonical agent definition, prompts, skills,
          chatmodes, hooks, and welcome doc that back the Azure Migration Agent.

          ## Usage (without the VS Code extension)

          1. Extract this ZIP into any repository.
          2. Files land under `.github/` and at the repo root (`MIGRATION-START-HERE.md`).
          3. Open the folder in a Copilot-Chat-capable client (VS Code + Copilot Chat, GitHub Copilot CLI, etc.).
          4. Type `/assess-any-application` in Copilot Chat, or the natural-language equivalent.

          For the guided experience (sidebar, decisions panel, status bar,
          session-lifecycle hooks), install the VS Code extension instead:
          https://marketplace.visualstudio.com/items?itemName=robertoborges.azure-migration-squad-vscode

          Source repo: https://github.com/RobertoBorges/GHCP-PromptMigration
          EOF

      - name: Upload agent content pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-content-pack-${{ github.run_number }}
          path: ${{ runner.temp }}/agent-content-pack/
          if-no-files-found: error
          retention-days: 90

      - name: Publish to VS Code Marketplace (vsce)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dryRun == 'false')
        working-directory: packages/azure-migration-squad-vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set. Configure it in repo settings → Secrets and variables → Actions. See docs/publishing-vscode-extension.md."
            exit 1
          fi
          npm run publish

      - name: Publish to Open VSX Registry
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dryRun == 'false')) && env.OVSX_PAT != ''
        working-directory: packages/azure-migration-squad-vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npx -y ovsx publish *.vsix -p "$OVSX_PAT"
