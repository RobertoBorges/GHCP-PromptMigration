# Keeps the squad's governance surface healthy by linting prompts and running the governance evaluator on relevant pull requests and on-demand.
name: Squad Health Check

on:
  pull_request:
    paths:
      - '.github/**'
      - '.squad/**'
      - 'skills/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run prompt linter
        run: node .squad/lint-prompts.mjs

  governance:
    name: governance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run governance evaluator
        run: node .squad/eval.mjs
