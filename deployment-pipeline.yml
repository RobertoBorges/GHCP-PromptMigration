# Simplified Azure DevOps Pipeline for Application Deployment

trigger:
  branches:
    include:
      - pipeline-branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  resourceGroupName: 'rg-infra-app-emea-vpmamidi-demo'
  webAppName: 'contoso-app-netframeworkwebapp-d-cus-01'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'
    includePreviewVersions: false

- task: DotNetCoreCLI@2
  displayName: 'Build StoreApp'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: 'src/StoreApp/StoreApp.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish Build Artifacts'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'

- task: AzureWebApp@1
  displayName: 'Deploy StoreApp to Azure Web App'
  inputs:
    azureSubscription: 'azure-service-connection'
    appType: 'webApp'
    appName: '$(webAppName)'
    resourceGroupName: '$(resourceGroupName)'
    package: '$(Build.ArtifactStagingDirectory)/**/*.zip'
    deploymentMethod: 'zipDeploy'
