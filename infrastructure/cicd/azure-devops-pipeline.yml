trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'windows-latest'

steps:
# Explicitly specifying the checkout with the correct URL format
- checkout: self
  persistCredentials: true

# Display Git remote information for debugging
- task: PowerShell@2
  displayName: 'Debug Git Remotes'
  inputs:
    targetType: 'inline'
    script: |
      git remote -v
      git status

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# Rest of the pipeline tasks remain unchanged
- task: DotNetCoreCLI@2
  displayName: 'Restore NuGet packages'
  inputs:
    command: 'restore'
    projects: '**/NetFrameworkWebApp.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build solution'
  inputs:
    command: 'build'
    projects: '**/NetFrameworkWebApp.csproj'
    arguments: '--configuration Release'

- task: DotNetCoreCLI@2
  displayName: 'Run tests'
  inputs:
    command: 'test'
    projects: '**/NetFrameworkWebApp.Tests.csproj'
    arguments: '--configuration Release'
  continueOnError: true

- task: DotNetCoreCLI@2
  displayName: 'Publish web app'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish artifacts'
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
