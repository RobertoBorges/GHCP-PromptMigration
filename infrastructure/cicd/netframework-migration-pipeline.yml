# Azure DevOps Pipeline for .NET Framework Web App Migration
# This pipeline builds, tests, and deploys the migrated .NET Framework application to Azure

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self
  persistCredentials: true  # This ensures the access token is used during checkout

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

- task: DotNetCoreCLI@2
  displayName: 'Restore NuGet packages'
  inputs:
    command: 'restore'
    projects: '**/NetFrameworkWebApp.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build solution'
  inputs:
    command: 'build'
    projects: '**/NetFrameworkWebApp.csproj'
    arguments: '--configuration Release'

- task: DotNetCoreCLI@2
  displayName: 'Run tests'
  inputs:
    command: 'test'
    projects: '**/NetFrameworkWebApp.Tests.csproj'
    arguments: '--configuration Release'
  continueOnError: true

- task: DotNetCoreCLI@2
  displayName: 'Publish web app'
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish artifacts'
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
